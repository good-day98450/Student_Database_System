<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Fee Management | Student DB</title>
  <link rel="stylesheet" href="/css/fee.css" />
</head>
<body>
  <header>
    <h1>💰 Fee Management</h1>
    <p>Student Database — Fee Collection & Status</p>
  </header>

  <main class="container">
    <!-- Form -->
    <section class="card">
      <h2>Add / Edit Fee Record</h2>
      <form id="feeForm">
        <input type="hidden" id="editIndex" />
        <div class="row">
          <input type="text" id="studentName" placeholder="Student Name" required />
          <input type="text" id="studentClass" placeholder="Class / Course" required />
        </div>
        <div class="row">
          <input type="date" id="dueDate" required />
          <input type="number" id="amount" placeholder="Amount (₹)" min="0" required />
        </div>
        <div class="row">
          <select id="status">
            <option value="pending">Pending</option>
            <option value="paid">Paid</option>
          </select>
          <button type="submit" class="btn">Save Record</button>
        </div>
      </form>
    </section>

    <!-- Controls -->
    <section class="card">
      <div class="controls">
        <input id="searchBox" placeholder="Search by student or class" />
        <select id="filterStatus">
          <option value="all">All</option>
          <option value="paid">Paid</option>
          <option value="pending">Pending</option>
        </select>
        <button id="generateReport" class="btn">Generate Fee Report</button>
      </div>
    </section>

    <!-- Table -->
    <section class="card">
      <h2>Fee Records</h2>
      <table id="feeTable">
        <thead>
          <tr>
            <th>Student</th>
            <th>Class</th>
            <th>Due Date</th>
            <th>Amount (₹)</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <!-- dynamically filled -->
        </tbody>
      </table>
    </section>

    <!-- Report -->
    <section class="card" id="reportCard" style="display:none;">
      <h2>Fee Report</h2>
      <div id="reportContent"></div>
    </section>
  </main>

  <footer>
    <small>Local demo — payment integration is simulated only.</small>
  </footer>

  <script src="/js/fee.js"></script>
</body>
</html>
