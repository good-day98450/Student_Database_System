<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Management System</title>
  <link rel="stylesheet" href="/css/course.css">
</head>

<body>
  <header class="header">
    <h1>🎓 Course Management System</h1>
  </header>

  <main>
    <div class="container">
      <!-- ===== Dashboard Page ===== -->
      <section id="dashboard" class="dashboard">

        <!-- ===== Add Student Form ===== -->
        <div class="add-student">
          <h3>Add Student</h3>
          <div class="form-group">
            <input type="text" id="studentName" placeholder="Student Name" />
            <input type="text" id="studentRoll" placeholder="Roll Number" />
            <input type="text" id="studentCourse" placeholder="Course" />
          </div>
          <button class="add-btn" onclick="addStudent()">Add Student</button>
        </div>

        <!-- ===== Student Records ===== -->
        <div class="student-records">
          <h3>Student Records</h3>
          <div class="table-wrapper">
            <table id="studentTable">
              <thead>
                <tr>
                  <th>Roll No</th>
                  <th>Name</th>
                  <th>Course</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
        <!-- <button class="logout-btn" onclick="window.location.href='login.html'">Logout</button> -->
        <!-- <div class="text-center mt-6">
          <a href="index.html" class="text-[#6cb1da] hover:text-[#49a4d9] transition-colors">
            <i class="fas fa-arrow-left mr-2"></i>
            Back to Home
          </a>
        </div> -->
        <button class="logout-btn" onclick="logout()" ondblclick="">Logout</button>
      </section>
    </div>
  </main>

  <footer class="footer">
    © 2025 Student DBMS | Designed by Sakshi
  </footer>

  <script src="/js/course.js"></script>
</body>

</html>
