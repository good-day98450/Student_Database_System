<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance Management | Student DBMS</title>
  <link rel="stylesheet" href="/css/attendance.css">
</head>
<body>
  <div class="container">
    <h1>🗓️ Attendance Management</h1>

    <!-- Attendance Form -->
    <section class="attendance-form">
      <h2>Mark Attendance</h2>
      <form id="attendanceForm">
        <input type="text" id="studentName" placeholder="Student Name" required>
        <input type="date" id="attendanceDate" required>
        <select id="attendanceStatus" required>
          <option value="">-- Select Status --</option>
          <option value="Present">Present</option>
          <option value="Absent">Absent</option>
        </select>
        <button type="submit">Save Attendance</button>
      </form>
    </section>

    <!-- Attendance Table -->
    <section class="attendance-table">
      <h2>Attendance Records</h2>
      <input type="month" id="filterMonth" />
      <button onclick="filterByMonth()">📅 Filter</button>
      <button onclick="exportAttendance()">📤 Export CSV</button>

      <table>
        <thead>
          <tr>
            <th>Student Name</th>
            <th>Date</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="attendanceBody"></tbody>
      </table>
    </section>

    <!-- Summary Section -->
    <section class="summary">
      <h2>📊 Monthly Summary</h2>
      <p id="summaryText">No data available yet.</p>
    </section>
  </div>

  <script src="/js/attendance.js"></script>
</body>
</html>
